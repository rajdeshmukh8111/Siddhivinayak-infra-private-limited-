<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Schedule Meeting | Siddhivinayak Infra Private Limited</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<section class="meeting">

<h1>Schedule A Meeting</h1>

<p>
Book a consultation with our team.
</p>

<form>

<input type="text"
placeholder="Your Name"
required>

<input type="tel"
placeholder="Phone Number"
required>

<input type="date"
required>

<input type="time"
required>

<textarea
placeholder="Message"
rows="5"></textarea>

<button>
Book Meeting
</button>

</form>

</section>

</body>
</html>
