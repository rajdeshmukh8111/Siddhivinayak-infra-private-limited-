<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Schedule Meeting | Siddhivinayak Infra Private Limited</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("rqFBeWUSq9YxlS_3Q");
})();
</script>
  
</head>
<body>

<section class="meeting">

<h1>Schedule A Meeting</h1>

<p>
Book a consultation with our team.
</p>

<form id="meetingForm">

<input type="text"
name="name"
placeholder="Your Name"
required>

<input type="tel"
name="phone"
placeholder="Phone Number"
required>

<input type="date"
name="date"
required>

<input type="time"
name="time"
required>

<textarea
name="message"
placeholder="Message"
rows="5"></textarea>

<button type="submit">
Book Meeting
</button>

</form>

</section>

</body>
</html>
