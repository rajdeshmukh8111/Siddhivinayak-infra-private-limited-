<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | Siddhivinayak Infra</title>

<link rel="stylesheet" href="style.css">

<style>

.admin-section{
min-height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

.admin-box{
background:#111;
padding:40px;
width:350px;
border-radius:20px;
box-shadow:0 0 25px rgba(212,175,55,.4);
text-align:center;
}

.admin-box h1{
color:#d4af37;
margin-bottom:30px;
}

.admin-box input{
width:100%;
padding:15px;
margin:15px 0;
border:none;
border-radius:10px;
background:#222;
color:white;
}

.admin-box button{
width:100%;
padding:15px;
background:#d4af37;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

#error{
color:red;
margin-top:15px;
}

</style>

</head>

<body>

<section class="admin-section">

<div class="admin-box">

<h1>Admin Login</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<p id="error"></p>

</div>

</section>

<script src="admin.js"></script>

</body>

</html>
